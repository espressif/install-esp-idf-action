name: Test ESP-IDF Installation

on:
  push:
    branches: [v1]
  pull_request:
    branches: [v1]
  schedule:
    - cron: '20 4 * * 2'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: ./

      - name: Verify Installation
        run: |
          echo "Verifying ESP-IDF installation..."
          echo "ESP-IDF Path: $IDF_PATH"
          echo "ESP-IDF Tools Path: $IDF_TOOLS_PATH"
          echo "ESP-IDF Python Environment Path: $IDF_PYTHON_ENV_PATH"
          echo "ESP-IDF Version:"
          idf.py --version

  fixed-version-test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: ./
        with:
          eim-version: "v0.2.6"

      - name: Verify Installation
        run: |
          idf.py --version

  invalid-version-test:
    name: Test Invalid Version Fails on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install ESP-IDF with Invalid Version (should fail)
        id: install
        continue-on-error: true
        uses: ./
        with:
          version: "5.5.1"  # Missing 'v' prefix - should fail

      - name: Verify Action Failed
        run: |
          if [ "${{ steps.install.outcome }}" = "failure" ]; then
            echo "✓ Action correctly failed with invalid version tag"
            exit 0
          else
            echo "✗ Action should have failed but didn't"
            exit 1
          fi
